services:
  tron-node:
    container_name: brics_tron_node
    image: tronprotocol/java-tron:latest
    restart: unless-stopped
    ports:
      - 8090:8090
      - 18888:18888
      - 50051:50051
    volumes:
      - tron_data:/java-tron/data
    networks:
      - postgres

  brics:
    build:
      context: .
      dockerfile: Dockerfile
    env_file: .env.production
    ports:
      - 8000:8000
    depends_on:
      - postgres
      - tron-node
    networks:
      - postgres

  postgres:
    container_name: brics_postgres
    image: postgres:latest
    env_file:
      - .env.production
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - 5432:5432
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - postgres

volumes:
  postgres_data:
  tron_data:

networks:
  postgres:
    driver: bridge
